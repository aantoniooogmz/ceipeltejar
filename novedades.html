<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novedades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600;1,9..144,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: transparent; padding: 0; margin: 0; }

.nv-section {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  padding: 52px 5% 56px;
  position: relative;
}
.nv-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(to right, #3a9e4f, #3b82c4, #e8831a, #f5c842);
}

/* HEADER */
.nv-header { margin-bottom: 32px; }
.nv-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: #eaf7ec; color: #2a7a3b;
  font-size: 0.67rem; font-weight: 800; letter-spacing: 0.13em; text-transform: uppercase;
  padding: 4px 13px 4px 9px; border-radius: 100px; margin-bottom: 16px;
  border: 1px solid rgba(58,158,79,.15);
}
.nv-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #3a9e4f; display: inline-block; }
.nv-titulo {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 3vw, 2.4rem);
  font-weight: 700; color: #1a2112; line-height: 1.1; margin-bottom: 12px;
}
.nv-titulo em { font-style: italic; color: #3a9e4f; }
.nv-subtitulo { font-size: 0.95rem; color: #4a5240; line-height: 1.8; max-width: 620px; }

/* BUSCADOR */
.nv-search-wrap {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px; flex-wrap: wrap;
}
.nv-search-box {
  position: relative; flex: 1; min-width: 220px;
}
.nv-search-box svg {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: #7a8c7b; pointer-events: none;
}
.nv-search-input {
  width: 100%;
  font-family: 'Nunito', sans-serif;
  font-size: 0.87rem; font-weight: 600; color: #1a2112;
  background: #f7f9f5;
  border: 1.5px solid rgba(26,33,18,.1);
  border-radius: 11px;
  padding: 11px 14px 11px 40px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.nv-search-input:focus {
  border-color: #3a9e4f;
  box-shadow: 0 0 0 3px rgba(58,158,79,.1);
  background: #fff;
}
.nv-search-input::placeholder { color: #7a8c7b; }
.nv-resultados {
  font-size: 0.78rem; font-weight: 700; color: #7a8c7b;
  white-space: nowrap;
}

/* GRID NOTICIAS */
.nv-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
  min-height: 200px;
}

/* CARD */
.nv-card {
  border: 1.5px solid rgba(26,33,18,.08);
  border-radius: 14px;
  overflow: hidden;
  display: flex; flex-direction: column;
  text-decoration: none;
  background: #fff;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.nv-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 28px rgba(0,0,0,.09);
  border-color: rgba(58,158,79,.25);
}
.nv-card-thumb {
  width: 100%; aspect-ratio: 16/9;
  object-fit: cover; display: block;
}
.nv-card-thumb-placeholder {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
}
.nv-card-body {
  padding: 16px 18px 20px;
  flex: 1; display: flex; flex-direction: column; gap: 6px;
}
.nv-card-fecha {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: #3a9e4f;
}
.nv-card-titulo {
  font-size: 0.9rem; font-weight: 800;
  color: #1a2112; line-height: 1.35;
}
.nv-card-resumen {
  font-size: 0.78rem; color: #4a5240;
  line-height: 1.65; flex: 1;
}
.nv-card-leer {
  font-size: 0.75rem; font-weight: 700;
  color: #2a7a3b; margin-top: 6px;
  display: inline-flex; align-items: center; gap: 4px;
}

/* ESTADOS */
.nv-loading {
  grid-column: 1/-1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 52px 20px;
  color: #7a8c7b; font-size: 0.9rem;
}
.nv-spinner {
  width: 32px; height: 32px;
  border: 3px solid #eaf7ec;
  border-top-color: #3a9e4f;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.nv-empty {
  grid-column: 1/-1;
  text-align: center; padding: 52px 20px;
  color: #7a8c7b;
}
.nv-empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.nv-empty-txt { font-size: 0.9rem; font-weight: 700; }

/* PAGINACIÓN */
.nv-paginacion {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; flex-wrap: wrap;
}
.nv-pag-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem; font-weight: 800;
  padding: 8px 14px; border-radius: 9px;
  border: 1.5px solid rgba(26,33,18,.1);
  background: #fff; color: #1a2112;
  cursor: pointer; transition: all 0.15s;
  min-width: 38px; text-align: center;
}
.nv-pag-btn:hover:not(:disabled) {
  border-color: #3a9e4f; background: #eaf7ec; color: #2a7a3b;
}
.nv-pag-btn.active {
  background: #3a9e4f; color: #fff; border-color: #3a9e4f;
}
.nv-pag-btn:disabled {
  opacity: 0.35; cursor: not-allowed;
}
.nv-pag-info {
  font-size: 0.75rem; font-weight: 700; color: #7a8c7b;
  padding: 0 6px;
}

@media (max-width: 820px) {
  .nv-grid { grid-template-columns: 1fr 1fr; }
  .nv-section { padding: 44px 5% 44px; border-radius: 14px; }
}
@media (max-width: 500px) {
  .nv-grid { grid-template-columns: 1fr; }
  .nv-section { padding: 36px 5% 36px; }
}
</style>
</head>
<body>

<section class="nv-section">

  <div class="nv-header">
    <div class="nv-badge"><span class="nv-badge-dot"></span>&nbsp;CEIP El Tejar</div>
    <h1 class="nv-titulo">Últimas <em>novedades</em></h1>
    <p class="nv-subtitulo">Mantente al día con todo lo que ocurre en el CEIP El Tejar: actividades, comunicados, eventos y mucho más.</p>
  </div>

  <div class="nv-search-wrap">
    <div class="nv-search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        class="nv-search-input"
        id="nv-search"
        placeholder="Buscar noticias…"
        autocomplete="off"
      >
    </div>
    <span class="nv-resultados" id="nv-resultados"></span>
  </div>

  <div class="nv-grid" id="nv-grid">
    <div class="nv-loading">
      <div class="nv-spinner"></div>
      Cargando noticias…
    </div>
  </div>

  <div class="nv-paginacion" id="nv-paginacion"></div>

</section>

<script>
const BASE = 'https://blogsaverroes.juntadeandalucia.es/ceipeltejar';
const PER_PAGE = 6;
const EMOJIS = ['📰','📣','🏫','🌟','🎉','📚','🎒','🌿','✏️','🔬'];

const PLACEHOLDER_COLORS = [
  'linear-gradient(135deg,#eaf7ec,#fffbea)',
  'linear-gradient(135deg,#e8f2fc,#eaf7ec)',
  'linear-gradient(135deg,#fff3e4,#fffbea)',
  'linear-gradient(135deg,#fffbea,#e8f2fc)',
];

const MESES = ['enero','febrero','marzo','abril','mayo','junio',
               'julio','agosto','septiembre','octubre','noviembre','diciembre'];

function formatFecha(iso) {
  const d = new Date(iso);
  return d.getDate() + ' ' + MESES[d.getMonth()] + ' ' + d.getFullYear();
}
function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || '').replace(/\[.*?\]/g,'').trim();
}
function getImg(post) {
  try { return post._embedded['wp:featuredmedia'][0].source_url; } catch(e) { return null; }
}

// Estado
let allPosts = [];
let filtered = [];
let currentPage = 1;
let totalPages = 1;
let searchQuery = '';

const grid = document.getElementById('nv-grid');
const paginacion = document.getElementById('nv-paginacion');
const resultadosEl = document.getElementById('nv-resultados');
const searchInput = document.getElementById('nv-search');

// Fetch TODOS los posts (máx 100 en 2 llamadas para cubrir la mayoría)
async function fetchAllPosts() {
  try {
    const [r1, r2] = await Promise.all([
      fetch(BASE + '/wp-json/wp/v2/posts?per_page=100&page=1&_embed'),
      fetch(BASE + '/wp-json/wp/v2/posts?per_page=100&page=2&_embed').catch(() => null)
    ]);
    const p1 = r1.ok ? await r1.json() : [];
    const p2 = (r2 && r2.ok) ? await r2.json() : [];
    allPosts = [...p1, ...p2].filter(p => p && p.id);
    filtered = [...allPosts];
    renderPage(1);
  } catch(e) {
    renderFallback();
  }
}

function applySearch(q) {
  searchQuery = q.toLowerCase().trim();
  if (!searchQuery) {
    filtered = [...allPosts];
  } else {
    filtered = allPosts.filter(p => {
      const titulo = stripHtml(p.title.rendered).toLowerCase();
      const resumen = stripHtml(p.excerpt.rendered).toLowerCase();
      return titulo.includes(searchQuery) || resumen.includes(searchQuery);
    });
  }
  renderPage(1);
}

function renderPage(page) {
  currentPage = page;
  totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const start = (page - 1) * PER_PAGE;
  const posts = filtered.slice(start, start + PER_PAGE);

  // Resultados texto
  if (searchQuery) {
    resultadosEl.textContent = filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');
  } else {
    resultadosEl.textContent = allPosts.length + ' publicaciones';
  }

  // Grid
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="nv-empty">
        <div class="nv-empty-icon">🔍</div>
        <p class="nv-empty-txt">No se encontraron noticias para "<em>${searchQuery}</em>"</p>
      </div>`;
  } else {
    grid.innerHTML = posts.map((post, i) => renderCard(post, i)).join('');
  }

  renderPaginacion();
  sendHeight();
}

function renderCard(post, i) {
  const img     = getImg(post);
  const fecha   = formatFecha(post.date);
  const titulo  = stripHtml(post.title.rendered) || 'Sin título';
  const resumen = stripHtml(post.excerpt.rendered);
  const url     = post.link;
  const emoji   = EMOJIS[i % EMOJIS.length];
  const color   = PLACEHOLDER_COLORS[i % PLACEHOLDER_COLORS.length];

  const thumb = img
    ? `<img class="nv-card-thumb" src="${img}" alt="${titulo}" loading="lazy">`
    : `<div class="nv-card-thumb-placeholder" style="background:${color};">${emoji}</div>`;

  return `
    <a class="nv-card" href="${url}" target="_top" rel="noopener">
      ${thumb}
      <div class="nv-card-body">
        <span class="nv-card-fecha">${fecha}</span>
        <p class="nv-card-titulo">${titulo}</p>
        <p class="nv-card-resumen">${resumen.slice(0,110)}${resumen.length > 110 ? '…' : ''}</p>
        <span class="nv-card-leer">Leer más →</span>
      </div>
    </a>`;
}

function renderPaginacion() {
  if (totalPages <= 1) { paginacion.innerHTML = ''; return; }

  let html = '';

  // Botón anterior
  html += `<button class="nv-pag-btn" onclick="renderPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Ant</button>`;

  // Páginas numéricas
  const range = getPaginaRange(currentPage, totalPages);
  range.forEach(p => {
    if (p === '...') {
      html += `<span class="nv-pag-info">…</span>`;
    } else {
      html += `<button class="nv-pag-btn ${p === currentPage ? 'active' : ''}" onclick="renderPage(${p})">${p}</button>`;
    }
  });

  // Botón siguiente
  html += `<button class="nv-pag-btn" onclick="renderPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Sig →</button>`;

  paginacion.innerHTML = html;
}

function getPaginaRange(current, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  const pages = [];
  pages.push(1);
  if (current > 3) pages.push('...');
  for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) pages.push(i);
  if (current < total - 2) pages.push('...');
  pages.push(total);
  return pages;
}

function renderFallback() {
  resultadosEl.textContent = '';
  grid.innerHTML = `
    <div class="nv-empty">
      <div class="nv-empty-icon">📡</div>
      <p class="nv-empty-txt">No se pudieron cargar las noticias. Inténtalo más tarde.</p>
    </div>`;
  paginacion.innerHTML = '';
}

// Buscador con debounce
let searchTimer;
searchInput.addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => applySearch(e.target.value), 320);
});

// Altura iframe
function sendHeight() {
  setTimeout(() => {
    window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
  }, 100);
}
window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);

// Arrancar
fetchAllPosts();
</script>

</body>
</html>
